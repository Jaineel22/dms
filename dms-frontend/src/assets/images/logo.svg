<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="DMS Logo">

  <!-- ── Icon mark: document stack with check ─────────────────────────────── -->
  <!-- Shadow doc (back) -->
  <rect x="6" y="8" width="26" height="32" rx="4" fill="#93c5fd"/>
  <!-- Main doc (front) -->
  <rect x="10" y="4" width="26" height="34" rx="4" fill="#2563eb"/>
  <!-- Fold corner -->
  <path d="M28 4 L36 12 L28 12 Z" fill="#1d4ed8"/>
  <path d="M28 4 L28 12 L36 12" fill="#60a5fa"/>
  <!-- Lines on doc -->
  <line x1="15" y1="18" x2="31" y2="18" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="23" x2="31" y2="23" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Checkmark badge -->
  <circle cx="33" cy="35" r="7" fill="#16a34a"/>
  <path d="M29.5 35 L32 37.5 L37 32" stroke="white" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Wordmark ─────────────────────────────────────────────────────────── -->
  <text x="48" y="22"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="16" font-weight="700" fill="#1e293b" letter-spacing="-0.3">
    DMS
  </text>
  <text x="48" y="37"
        font-family="Inter, ui-sans-serif, system-ui, sans-serif"
        font-size="9.5" font-weight="400" fill="#64748b" letter-spacing="0.4">
    DOCUMENT MANAGEMENT
  </text>
</svg>
